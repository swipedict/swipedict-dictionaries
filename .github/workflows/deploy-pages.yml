name: Deploy Dictionaries to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download media index (avoids full LFS checkout)
        run: |
          curl -sL -H "Authorization: token ${{ secrets.MEDIA_REPO_TOKEN }}" \
            -H "Accept: application/vnd.github.v3.raw" \
            "https://api.github.com/repos/swipedict/swipedict-dictionaries-media/contents/index.json" \
            -o media-index.json

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install build dependencies
        working-directory: infra
        run: npm ci

      - name: Build dictionaries (using media index for audio manifests)
        working-directory: infra
        run: npm run build
        env:
          MEDIA_INDEX: ${{ github.workspace }}/media-index.json

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
